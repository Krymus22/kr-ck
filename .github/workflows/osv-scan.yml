name: Dependency Vulnerability Scan (OSV)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 1 * * *'  # Daily 01:00 UTC (22:00 BRT)
  workflow_dispatch:

jobs:
  osv-scan:
    name: OSV-Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run OSV-Scanner
        run: |
          # Install and run osv-scanner directly (action has version issues)
          npm install -g @google/osv-scanner
          osv-scanner --lockfile package-lock.json --recursive ./
        continue-on-error: true
      - name: Upload OSV results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: osv-results
          path: osv-results.json
          retention-days: 30
          if-no-files-found: ignore
