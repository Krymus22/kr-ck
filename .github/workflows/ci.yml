name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install --legacy-peer-deps
      - run: npx eslint src/ --no-warn-ignored || true
        continue-on-error: true

  typecheck:
    name: TypeScript Type-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install --legacy-peer-deps
      - run: npx tsc --noEmit

  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    env:
      NVIDIA_API_KEY: dummy
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install --legacy-peer-deps
      - name: Run tests
        run: npx vitest run --coverage --coverage.reporter=lcov --coverage.reporter=text-summary --exclude src/__tests__/memory-full.test.ts
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 7

  smoke:
    name: Build + Start
    runs-on: ubuntu-latest
    env:
      NVIDIA_API_KEY: dummy
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - run: npm run build
      - name: Verify build
        run: test -f dist/index.js && echo "OK" || exit 1
      - name: Smoke test (5s)
        run: timeout 5 node dist/index.js 2>&1 || true
