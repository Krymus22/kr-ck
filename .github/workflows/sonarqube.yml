name: SonarQube Analysis (DISABLED — run manually via workflow_dispatch)

# DESATIVADO para economizar GitHub Actions minutes (consome ~98 min/mês
# no free tier private repo). Para rodar manualmente:
#   1. Vai em https://github.com/Krymus22/claude-killer/actions/workflows/sonarqube.yml
#   2. Clica em "Run workflow"
# Reativar: trocar `workflow_dispatch:` apenas por `push: branches: [master]`
# e `pull_request: branches: [master]`.

on:
  workflow_dispatch:

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    env:
      NVIDIA_API_KEY: dummy
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit
      - name: Run tests with coverage
        run: npx vitest run --coverage
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        if: env.SONAR_TOKEN != ''
