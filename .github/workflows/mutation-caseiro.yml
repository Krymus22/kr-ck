name: Mutation Testing (Caseiro)

# Stryker caseiro — mutation testing simplificado que roda com vitest normal
# (sem worker threads, sem sandboxes). Funciona com process.chdir() e
# binários externos (selene/stylua) que o Stryker não suporta.
#
# Roda toda noite às 22:00 BRT (01:00 UTC) e pode ser disparado manualmente.

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  mutation-test:
    name: Mutation Testing (Caseiro)
    runs-on: ubuntu-latest
    # 10 horas = 600 min. Modo completo leva ~5h (3150 mutações × 6s cada).
    # Janela: 22:00 BRT até 08:00 BRT (10h).
    timeout-minutes: 600
    env:
      NVIDIA_API_KEY: dummy
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run mutation tests (full mode)
        run: |
          # Full mode: all mutations per file (not just 5)
          # Estimated: ~3150 mutations × ~6s = ~5h15m
          # Timeout: 10h (ample margin)
          # Exit code 1 = some mutations survived (expected — that's the point)
          # We capture output and always succeed so artifact uploads
          python3 scripts/mutation-test.py 2>&1 || true
      - name: Check report exists
        run: |
          if [ -f reports/mutation/*.json ]; then
            echo "Report found!"
            cat reports/mutation/*.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'Mutation Score: {d[\"mutation_score\"]}%'); print(f'Survived: {d[\"survived\"]}')"
          else
            echo "No report found — script may have timed out"
          fi
      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 30
