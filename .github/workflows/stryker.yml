name: Mutation Testing (Stryker) (DISABLED — run manually)

# DESATIVADO: rodava todo dia às 22:30 BRT (9h de execução = ~540 min/dia!).
# Em 1 dia consome 27% do limite mensal de 2000 min do free tier private.
# Para rodar manualmente quando quiser:
#   1. Vai em https://github.com/Krymus22/claude-killer/actions/workflows/stryker.yml
#   2. Clica em "Run workflow"
# Reativar: descomentar as linhas `schedule:` abaixo.

on:
  # Roda toda noite: 22:30 BRT (01:30 UTC) até 07:30 BRT (10:30 UTC)
  # Janela de 9 horas para análise completa
  # schedule:
  #   - cron: '30 1 * * *'
  # Permite rodar manualmente
  workflow_dispatch:

jobs:
  mutation-test:
    name: Stryker Mutation Testing
    runs-on: ubuntu-latest
    # 9 horas = 540 minutos (22:30 às 07:30 BRT)
    timeout-minutes: 540
    env:
      NVIDIA_API_KEY: dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run Stryker
        run: npx stryker run
        continue-on-error: true
      - name: Upload Stryker Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-report
          path: reports/mutation/
          retention-days: 30
