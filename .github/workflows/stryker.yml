name: Mutation Testing (Stryker)

# DESATIVADO: Stryker é incompatível com testes que usam process.chdir()
# (worker threads não suportam chdir no Node.js) e com testes que dependem
# de binários externos (selene/stylua/rojo não estão nos sandboxes).
# Para rodar manualmente quando quiser:
#   1. https://github.com/Krymus22/kr-ck/actions/workflows/stryker.yml
#   2. Clica em "Run workflow"
# Reativar: descomentar as linhas schedule abaixo.

on:
  # Roda toda noite: 20:00 BRT (23:00 UTC) até 08:00 BRT (11:00 UTC)
  # Janela de 12 horas para análise completa
  # schedule:
  #   - cron: '0 23 * * *'
  # Permite rodar manualmente
  workflow_dispatch:

jobs:
  mutation-test:
    name: Stryker Mutation Testing
    runs-on: ubuntu-latest
    # 12 horas = 720 minutos (20:00 às 08:00 BRT)
    timeout-minutes: 720
    env:
      NVIDIA_API_KEY: dummy
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run Stryker
        run: npx stryker run
        continue-on-error: true
      - name: Upload Stryker Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stryker-report
          path: reports/mutation/
          retention-days: 30
