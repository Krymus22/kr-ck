name: Mutation Testing (Stryker)

on:
  # Roda toda noite à meia-noite UTC
  schedule:
    - cron: '0 0 * * *'
  # Permite rodar manualmente
  workflow_dispatch:

jobs:
  mutation-test:
    name: Stryker Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NVIDIA_API_KEY: dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run Stryker
        run: npx stryker run
        continue-on-error: true
      - name: Upload Stryker Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-report
          path: reports/mutation/
          retention-days: 30
