name: Mutation Testing (Stryker)

# Reativado: repo agora é público, CI é ilimitado.
on:
  # Roda toda noite: 22:30 BRT (01:30 UTC) até 07:30 BRT (10:30 UTC)
  # Janela de 9 horas para análise completa
  schedule:
    - cron: '30 1 * * *'
  # Permite rodar manualmente
  workflow_dispatch:

jobs:
  mutation-test:
    name: Stryker Mutation Testing
    runs-on: ubuntu-latest
    # 9 horas = 540 minutos (22:30 às 07:30 BRT)
    timeout-minutes: 540
    env:
      NVIDIA_API_KEY: dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run Stryker
        run: npx stryker run
        continue-on-error: true
      - name: Upload Stryker Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-report
          path: reports/mutation/
          retention-days: 30
